<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="https://teacherchriser.github.io/images/me.gif" type="image/x-icon">
<title>CAI3 Poster</title>

  <!-- Google Fonts -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap');
  </style>

  <title>Mi Página</title>

  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background-color: black;
    }

    /* HEADER */
    header {
      background-color: white;
      display: flex;
      align-items: center;
      padding: 10px 20px;
      gap: 15px;
    }

    header img {
      height: 50px;
      width: auto;
    }

    .header-text {
      display: flex;
      flex-direction: column;
    }

    .header-text h1 {
      margin: 0;
      font-size: 18px;
      color: #001c7d;
    }

    .header-text h2 {
      margin: 0;
      font-size: 14px;
      font-weight: 400;
      color: #001c7d;
    }

    /* BODY */
    .content {
      padding: 20px;
    }

    .content iframe {
      width: 100%;
      height: 70vh;
      border: none;
    }

    /* FOOTER */
    footer {
      background-color: white;
      color: #001c7d;
      text-align: center;
      padding: 10px;
      font-size: 14px;
    }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      header {
        flex-direction: column;
        align-items: flex-start;
      }

      header img {
        height: 40px;
      }

      .header-text h1 {
        font-size: 16px;
      }

      .header-text h2 {
        font-size: 12px;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <img src="https://www.upn.edu.co/wp-content/uploads/2025/08/Identidad-UPN-25-horizontal-azul-fondo-transparente.png" alt="Logo">
    <div class="header-text">
      <h1>UPN Language Week 2026-1</h1>
      <h2>CAI3-03: Higher Education: The New Global Economic War</h2>
    </div>
  </header>

  <!-- BODY -->
  <div class="content">
    <div style="position: relative; width: 100%; height: 0; padding-top: 141.4286%;
 padding-bottom: 0; box-shadow: 0 2px 8px 0 rgba(63,69,81,0.16); margin-top: 1.6em; margin-bottom: 0.9em; overflow: hidden;
 border-radius: 8px; will-change: transform;">
  <iframe loading="lazy" style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; border: none; padding: 0;margin: 0;"
    src="https://www.canva.com/design/DAHGZXfDveY/6AcloOU8mtV3ABfreuAnsQ/watch?embed" allowfullscreen="allowfullscreen" allow="fullscreen">
  </iframe>
</div>
  </div>

  <!-- FOOTER -->
  <footer>
    CAI3 - Group 3 - © 2026-1 - Teacher Christian Serrano
  </footer>

</body>

<script> 
document.oncontextmenu = function() { 
    return false; 
};
</script>

</html>
