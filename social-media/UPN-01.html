<!DOCTYPE html>

<title>Teacher Chris UPN Social Media</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap');

<style>
  body {
    margin: 0;
    font-family: "Montserrat", sans-serif;
    background-color: #001c7d;

    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background-color: white;
    display: flex;
    align-items: center;
    padding: 10px 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }

  header img {
    height: 40px;
    margin-right: 10px;
  }

  header h4 {
    
    color: #001c7d;
    margin: 0;
  }

  /* IFRAME ocupa todo el espacio disponible */
  iframe {
    flex: 1; /* 🔥 clave */
    width: 100%;
    border: none;
    min-height: 500px;
  }

  /* FOOTER */
  footer {
    background-color: white;
    text-align: center;
    padding: 10px 20px;
    font-size: 10px;
    color: #555;
  }

</style>
</head>

<body>

<!-- HEADER -->
<header>
  <img src="https://www.upn.edu.co/wp-content/uploads/2025/08/Identidad-UPN-25-horizontal-azul-fondo-transparente.png" alt="Logo">

  <div style="display: flex; flex-direction: column; margin-left: 10px;">
    
    <p style="font-weight: 700; color: #001c7d; margin: 0; font-size: 24px;">

    <p style="font-weight: 500; color: #001c7d; margin: 0; font-size: 9px;">

<!-- VIVA ENGAGE (tal cual) -->
