<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Image Slider Flexible</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Play:wght@400;700&display=swap');

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:0px;
}

/* CONTENEDOR PRINCIPAL */

.slider{
position:relative;
width:80%;
max-width:800px;
height:450px;
margin:auto;
overflow:hidden;
background:#000;
border-radius:10px;
}

/* CONTENEDOR DE SLIDES */

.slides{
display:flex;
height:100%;
transition:transform .6s ease;
}

/* CADA SLIDE */

.slide{
min-width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

.slide a{
display:flex;
justify-content:center;
align-items:center;
width:100%;
height:100%;
}

/* IMÁGENES FLEXIBLES */

.slide img{
max-width:100%;
max-height:100%;
object-fit:contain;
}

/* FLECHAS */

.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:40px;
color:white;
background:rgba(0,0,0,0.4);
padding:10px 15px;
cursor:pointer;
border-radius:6px;
user-select:none;
}

.arrow:hover{
background:rgba(0,0,0,0.7);
}

.left{
left:10px;
}

.right{
right:10px;
}

/* BOTONES INFERIORES */

.dots{
position:absolute;
bottom:0px;
width:100%;
text-align:center;
}

.dot{
height:12px;
width:12px;
margin:5px;
background:#bbb;
border-radius:50%;
display:inline-block;
cursor:pointer;
}

.dot.active{
background:white;
}

</style>
</head>

<body>

<div class="slider">

<div class="slides" id="slides">

<div class="slide">
<a href="https://forms.gle/Vrep5dwKkZy28tsT9" target="_blank"><img src="https://teacherchriser.github.io/images/UPN-Lang-Fest-01.jpg"></a>
</div>

<div class="slide">
<a href="https://coorlenguasupn.wordpress.com/2026/03/04/%f0%9f%8e%a8-inscripciones-language-fest-2026-%f0%9f%8c%8e/" target="_blank"><img src="https://coorlenguasupn.wordpress.com/wp-content/uploads/2026/03/lanugage-fest-2026.png"></a>
</div>

<div class="slide">
<a href="https://coorlenguasupn.wordpress.com/2026/03/02/convocatoria-upn-en-150-palabras-convierte-tu-vida-universitaria-en-cuento-%e2%9c%8d%f0%9f%8f%bd/" target="_blank"><img src="https://coorlenguasupn.wordpress.com/wp-content/uploads/2026/03/pieza-convocatoria-upn-en-150-palabras.png"></a>
</div>



</div>

<div class="arrow left" onclick="prevSlide()">❮</div>
<div class="arrow right" onclick="nextSlide()">❯</div>

<div class="dots" id="dots"></div>

</div>

<p style="margin-top: 5px; font-size: 12px; font-family: 'Play', sans-serif;">Click en las imágenes para más información</p>

<script>

let index = 0
const slides = document.getElementById("slides")
const total = slides.children.length
const dotsContainer = document.getElementById("dots")

/* CREAR BOTONES */

for(let i=0;i<total;i++){

let dot=document.createElement("span")
dot.className="dot"

dot.onclick=()=>goToSlide(i)

dotsContainer.appendChild(dot)

}

const dots=document.querySelectorAll(".dot")

function updateSlider(){

slides.style.transform="translateX("+(-100*index)+"%)"

dots.forEach(d=>d.classList.remove("active"))
dots[index].classList.add("active")

}

function nextSlide(){

index++

if(index>=total) index=0

updateSlider()

}

function prevSlide(){

index--

if(index<0) index=total-1

updateSlider()

}

function goToSlide(i){

index=i
updateSlider()

}

/* CAMBIO AUTOMÁTICO */

setInterval(nextSlide,10000)

updateSlider()

</script>

</body>
</html>
